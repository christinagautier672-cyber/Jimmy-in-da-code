<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Love OS ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  overflow-x: hidden;
  background: #050816;
}

/* 🌌 Animated background */
.bg {
  position: fixed;
  inset: 0;
  background: linear-gradient(-45deg, #0f172a, #1e1b4b, #0b1023, #111827);
  background-size: 400% 400%;
  animation: bgMove 14s ease infinite;
  z-index: -1;
}

@keyframes bgMove {
  0% {background-position:0% 50%}
  50% {background-position:100% 50%}
  100% {background-position:0% 50%}
}

/* floating hearts */
.heart {
  position: fixed;
  color: rgba(236,72,153,0.7);
  font-size: 14px;
  animation: floatUp 10s linear forwards;
}

@keyframes floatUp {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}

/* 🔐 LOCK SCREEN */
#lock {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  text-align: center;
  padding: 20px;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  width: 220px;
  text-align: center;
}

/* MAIN */
.container {
  width: min(900px, 90%);
  margin: auto;
  padding: 50px 0;
}

/* ✨ CARDS */
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 18px;
  padding: 18px;
  margin: 15px 0;
  cursor: pointer;
  transition: 0.25s ease;
  backdrop-filter: blur(10px);
}

.card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 0 25px rgba(236,72,153,0.35);
}

/* BUTTON */
button {
  background: linear-gradient(90deg, #f472b6, #22d3ee);
  border: none;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

/* POPUP */
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #0f172a;
  border: 2px solid #f472b6;
  padding: 20px;
  border-radius: 15px;
  display: none;
  z-index: 10000;
  width: 280px;
  text-align: center;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- 🔐 LOCK -->
<div id="lock">
  <h2>💖 LOVE SYSTEM LOCKED</h2>
  <p>Hint: 3 words that mean everything</p>
  <input id="pass" placeholder="password"/>
  <button onclick="unlock()">Unlock</button>
</div>

<!-- MAIN -->
<div id="site" style="display:none">

<div class="container">

<h1 style="text-align:center;">To My Favorite Human ❤️</h1>

<div class="card" onclick="popup('You are my safest place in every timeline.')">
💌 Memory: Safety
</div>

<div class="card" onclick="popup('I would choose you again and again.')">
💖 Memory: Choice
</div>

<div class="card" onclick="popup('You feel like home to me.')">
🏡 Memory: Home
</div>

<div class="card" onclick="popup('We are a system built on love.')">
💻 Memory: System
</div>

</div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<p id="text"></p>
<button onclick="closePopup()">close</button>
</div>

<script>

/* PASSWORD */
function unlock(){
  let val = document.getElementById("pass").value
    .toLowerCase()
    .trim();

  if(val === "i love you"){
    document.getElementById("lock").style.display = "none";
    document.getElementById("site").style.display = "block";
  } else {
    alert("try again ❤️ (hint: 3 words)");
  }
}

/* POPUP */
function popup(text){
  document.getElementById("text").innerText = text;
  document.getElementById("popup").style.display = "block";
}
function closePopup(){
  document.getElementById("popup").style.display = "none";
}

/* FLOATING HEARTS */
setInterval(() => {
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤";
  h.style.left = Math.random() * 100 + "vw";
  h.style.top = "100vh";
  h.style.fontSize = (10 + Math.random()*10) + "px";

  document.body.appendChild(h);

  setTimeout(() => h.remove(), 10000);
}, 400);

</script>

</body>
</html>
